<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        overflow: hidden;
        color: white;
        text-align: center;
        background: black;
    }

    .slideshow {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -2;
    }

    .slide {
    position: absolute;
    width: 100vw;
    height: 100vh;
    background-size: cover;      /* Bikin foto full tanpa gepeng */
    background-position: center; /* Fokus tengah */
    background-repeat: no-repeat;
    opacity: 0;
    animation: fadeSlide 18s infinite;
}

    .slide:nth-child(1) { animation-delay: 0s; }
    .slide:nth-child(2) { animation-delay: 5s; }
    .slide:nth-child(3) { animation-delay: 10s; }

    @keyframes slideShow {
        0% {opacity: 0;}
        10% {opacity: 1;}
        30% {opacity: 1;}
        40% {opacity: 0;}
        100% {opacity: 0;}
    }

    .overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.45);
        z-index: -1;
    }

    .content {
        margin-top: 18vh;
        padding: 20px;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 20px;
    }

    .gift {
        font-size: 80px;
        cursor: pointer;
        animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
        0%,100% {transform: translateY(0);}
        50% {transform: translateY(-15px);}
    }

    .message {
        margin-top: 30px;
        font-size: 1.5em;
        min-height: 120px;
        padding: 0 20px;
    }

    .love {
        position: absolute;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from {transform: translateY(100vh);}
        to {transform: translateY(-10vh);}
    }
</style>
</head>
<body>

<div class="slideshow">
    <div class="slide" style="background-image: url('foto1.jpeg');"></div>
    <div class="slide" style="background-image: url('foto2.jpeg');"></div>
    <div class="slide" style="background-image: url('foto3.jpeg');"></div>
</div>

<div class="overlay"></div>

<div class="content">
    <h1>Happy Birthday Sayang ❤️</h1>
    <div class="gift" onclick="bukaKado()">🎁</div>
    <div class="message" id="pesan"></div>
</div>

<audio id="musik" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
const text = "Selamat ulang tahun, cintaku...Hari ini bukan cuma tentang bertambahnya usiamu,  tapi tentang betapa bersyukurnya aku karena dunia menghadirkan kamu ke dalam hidupku. Jujur, aku nggak pernah nyangka  bahwa aku bisa mencintai seseorang sedalam ini.  Seseorang yang kehadirannya bisa mengubah hari-hari biasa jadi luar biasa,  yang senyumnya bisa menenangkan hati yang paling lelah. Kamu adalah tempat aku pulang,  bahkan saat dunia terasa nggak ramah.  Kamu adalah alasan kenapa aku tetap kuat,  bahkan di saat aku hampir menyerah. Maaf kalau selama ini aku masih sering membuatmu kecewa,  masih belum bisa jadi yang sempurna untukmu.  Tapi satu hal yang pasti,  perasaanku ke kamu nggak pernah setengah-setengah. Aku mencintaimu dengan cara yang mungkin nggak selalu terlihat sempurna,  tapi selalu tulus dan selalu ingin bertahan. Di ulang tahunmu ini, aku nggak minta banyak.  Aku cuma berharap...  kamu tetap ada di hidupku,  menemani setiap langkahku,  dan memberi aku kesempatan untuk terus mencintaimu  lebih baik dari hari ke hari. Dan di setiap doa yang aku panjatkan...  aku selalu menyebut namamu. Aku berdoa semoga kamu selalu diberi kesehatan,  dipanjangkan umurnya,  dilancarkan setiap langkah dan rezekinya,  serta dikelilingi oleh hal-hal baik di setiap harimu.Semoga hatimu selalu dijaga,  dikuatkan saat lelah,  dan dipeluk oleh kebahagiaan yang nggak ada habisnya. Kalau boleh aku egois sedikit dalam doaku...  aku berharap semoga aku tetap jadi bagian dari hidupmu,  hari ini, besok, dan sampai kapanpun itu. Kalau suatu saat nanti kamu merasa dunia terlalu berat,  ingat ya... kamu punya aku.  Aku akan selalu ada,  bukan cuma di hari bahagiamu,  tapi juga di hari terberatmu. Selamat ulang tahun, sayangku...  Terima kasih sudah lahir,  dan terima kasih sudah memilih untuk tetap ada disisi, bersamaku. Aku sayang kamu...  lebih dariyang bisa dijelaskan oleh kata-kata ❤️";
let i = 0;

function bukaKado() {
    document.getElementById("musik").play();
    ketikPesan();
}

function ketikPesan() {
    if (i < text.length) {
        document.getElementById("pesan").innerHTML += text.charAt(i);
        i++;
        setTimeout(ketikPesan, 50);
    }
}

function loveJatuh() {
    const love = document.createElement("div");
    love.classList.add("love");
    love.innerHTML = "❤️";
    love.style.left = Math.random() * 100 + "vw";
    love.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(love);

    setTimeout(() => {
        love.remove();
    }, 5000);
}

setInterval(loveJatuh, 300);
</script>

</body>
</html>
