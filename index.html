<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        overflow: hidden;
        color: white;
        text-align: center;
        background: black;
    }

    .slideshow {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -2;
    }

    .slide {
    position: absolute;
    width: 100vw;
    height: 100vh;
    background-size: cover;      /* Bikin foto full tanpa gepeng */
    background-position: center; /* Fokus tengah */
    background-repeat: no-repeat;
    opacity: 0;
    animation: fadeSlide 18s infinite;
}

    .slide:nth-child(1) { animation-delay: 0s; }
    .slide:nth-child(2) { animation-delay: 5s; }
    .slide:nth-child(3) { animation-delay: 10s; }

    @keyframes slideShow {
        0% {opacity: 0;}
        10% {opacity: 1;}
        30% {opacity: 1;}
        40% {opacity: 0;}
        100% {opacity: 0;}
    }

    .overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.45);
        z-index: -1;
    }

    .content {
        margin-top: 18vh;
        padding: 20px;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 20px;
    }

    .gift {
        font-size: 80px;
        cursor: pointer;
        animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
        0%,100% {transform: translateY(0);}
        50% {transform: translateY(-15px);}
    }

    .message {
        margin-top: 30px;
        font-size: 1.5em;
        min-height: 120px;
        padding: 0 20px;
    }

    .love {
        position: absolute;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from {transform: translateY(100vh);}
        to {transform: translateY(-10vh);}
    }
</style>
</head>
<body>

<div class="slideshow">
    <div class="slide" style="background-image: url('foto1.jpeg');"></div>
    <div class="slide" style="background-image: url('foto2.jpeg');"></div>
    <div class="slide" style="background-image: url('foto3.jpeg');"></div>
</div>

<div class="overlay"></div>

<div class="content">
    <h1>Happy Birthday Sayang ❤️</h1>
    <div class="gift" onclick="bukaKado()">🎁</div>
    <div class="message" id="pesan"></div>
</div>

<audio id="musik" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
const text = "Selamat ulang tahun cintaku ❤️ Semoga kamu selalu diberi kesehatan, kebahagiaan, dan semua impianmu tercapai. Terima kasih sudah hadir dan menjadi orang paling spesial di hidup aku. Aku sayang kamu hari ini, besok, dan selamanya 💕";
let i = 0;

function bukaKado() {
    document.getElementById("musik").play();
    ketikPesan();
}

function ketikPesan() {
    if (i < text.length) {
        document.getElementById("pesan").innerHTML += text.charAt(i);
        i++;
        setTimeout(ketikPesan, 50);
    }
}

function loveJatuh() {
    const love = document.createElement("div");
    love.classList.add("love");
    love.innerHTML = "❤️";
    love.style.left = Math.random() * 100 + "vw";
    love.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(love);

    setTimeout(() => {
        love.remove();
    }, 5000);
}

setInterval(loveJatuh, 300);
</script>

</body>
</html>
